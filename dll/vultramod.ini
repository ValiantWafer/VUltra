; ============================================================================
;  V Ultra - configuration
; ============================================================================
;  Edit this file with Notepad, save, then launch the game (or just enter the
;  next room if you're already playing. Most options apply as new content
;  generates). The Spellbook Manager app edits this same file.
;
;  This file is also the single source of the titles and descriptions shown in
;  the manager app. For each setting, the comment block directly above its
;  "key = value" line is its help text: the FIRST comment line is the title (the
;  app's checkbox/label) and the lines below it are the description (the app's
;  hover tooltip). Keep one blank line between settings. Spells use the inline
;  "key = value ; Title: description" form instead.
;
;  Values are 1 = on / 0 = off unless noted. Lines starting with ';' are
;  comments and are ignored by the game.
;
;  Floor numbers used below (0..12):
;    0=Caves 1   1=Caves 2   2=Caves 3
;    3=Forest 1  4=Forest 2  5=Forest 3
;    6=Catacombs 1  7=Catacombs 2  8=Catacombs 3
;    9=Rift 1   10=Rift 2   11=Rift 3   12=Final Boss
; ============================================================================


[spellbook_pool]
; Which spells can appear in spellbooks. 1 = in the pool, 0 = removed. Changes
; apply to the next spellbook the game generates (next room/level).

; --- standard spellbook spells ---
dash            = 1 ; Dash: dash a short distance.
fire_shield     = 1 ; Fire Shield: surround yourself with fire.
teleport        = 1 ; Blink: teleport to a nearby spot.
ice_bolt        = 1 ; Ice Bolt: fire a freezing bolt.
fireball        = 1 ; Fireball: hurl an exploding fireball.
lightning       = 1 ; Lightning: call down lightning.
chain_lightning = 1 ; Chain Lightning: lightning that arcs between foes.
spirits         = 1 ; Spirits: summon attacking spirits.
magic_missile   = 1 ; Magic Missile: fire homing missiles.
shockwave       = 1 ; Shockwave: emit a knockback shockwave.
elec_lance      = 1 ; Elec Lance: pierce with an electric lance.
frost_nova      = 1 ; Frost Nova: freeze nearby enemies.
flame_pillar    = 1 ; Flame Pillar: raise a pillar of flame.
dark_metamorph  = 1 ; Evil Transformation: transform with dark power.
charm           = 1 ; Charm: charm an enemy to your side.
summon_monster  = 1 ; Summon Monster: summon a monster ally.

; --- extra spells: only added to the pool if set to 1 ---
portal          = 0 ; Portal: create a portal, or teleport to an existing one.
telekinesis     = 0 ; Telekinesis: move objects with your mind.
psychic_push    = 0 ; Psychic Push: shove enemies back with force.


[backgrounds]
; Wisp Curse background (hidden in the app)
; Re-enable the cut "Wisp Curse" background. It takes the slot of the background
; numbered by replace_bg (5 = Illiterate) in the character-creation menu.
wisp_curse      = 0
replace_bg      = 5

; Wisp Curse
; Host-only run modifier: forces the Wisp Curse. Makes masses of invincible green
; wisps float across the screen on every floor except the final boss. They deal
; 5000+ damage if you're hit by them. No client mod needed; the host drives it
; and syncs to clients.
force_wisp_curse = 0


[loop]
; Looping / Endless Mode
; Force the cut "New Game Plus / The Cycle" looped difficulty. After defeating the
; final boss you loop back to Caves 1 with all current items and stats, now on New
; Game+ difficulty. Can be toggled on mid-game. Experimental; while on it sticks
; to the current save, so start a fresh run to compare.
new_game_plus   = 1

; Start NewGame+ difficulty at loop #:
; Which loop number New Game+ turns on at. 1 is the first playthrough (normal, no
; New Game+), 2 is the first loop, and so on. New Game+ is leftover code from an
; older version of the game; it adds more enemy speed, attack, and health. Default
; 2, so a fresh run already starts at first-loop (New Game+) difficulty from Caves
; 1; set it to 1 for a normal first playthrough. Effective difficulty =
; start_difficulty + loops completed this run.
start_difficulty = 2

; Loop back to:
; When Looping is on, which floor you restart at after beating the final boss
; (0..12). Default 0 (Caves 1).
loop_start_floor = 0

; Extra enemy scaling starts at loop #:
; The loop number where monsters begin getting EXTRA health and damage on top of
; New Game+, growing more every loop after. Loop # counts the New Game+ start loop
; plus loops completed this run. Default 3 (the second loop). Set this high to
; keep every loop at flat New Game+ with no extra scaling. 
scaling_starts_at = 5

; Extra scaling by: +
; How much extra monster HP and damage each loop adds beyond the scaling start,
; linear and forever (e.g. 50 = +50% at the start loop, +100% the next, +150% the
; next...). Float. HOST-side.
loop_scale_pct = 25

; Duplicate starts at loop #:
; The loop number the enemy DUPLICATION below begins at and starts escalating each
; loop (loop 1 = first playthrough). HOST-side.
spawn_increase_starts_at = 4

; Duplicate enemies by: +
; DUPLICATE each spawned enemy. +100% = every enemy gets one twin at the same spot
; (the game's physics push them apart); +50% = about half get a twin; +250% = two
; guaranteed copies plus a coin-flip third. Escalates per loop, limited by the cap
; below. This has no ceiling from the level layout, so it's how you go truly
; dense. 0 = off. HOST-side. (Density is quantized to a spacing grid, so it's
; approximate.)
spawn_increase_pct = 25

; Max duplication:
; Ceiling on the DUPLICATION above so later loops don't get unplayable. The
; escalating per-loop bonus stops growing once it reaches this total. 0 = no cap.
; Example: with +200% per loop and a 600% cap, you get +200% / +400% / +600% /
; +600% / ... HOST-side.
spawn_increase_max_pct = 10000

; Spread starts at loop #:
; The loop number the enemy SPREAD below begins at and starts escalating each loop
; (loop 1 = first playthrough). Independent of the duplicate start. HOST-side.
spawn_spread_starts_at = 3

; Enemy spawn spread: +
; Add more DISTINCT enemies spread across the level (instead of stacking copies)
; by making spawns cheaper, so more fit at different spots. Escalates per loop.
; This naturally tops out once the level's spawn spots fill up, so use it to fill
; a level out and use Duplicate to go beyond that. Pairs with duplication. 0 =
; off. HOST-side.
spawn_spread_pct = 100

; Max spread:
; Ceiling on the SPREAD above so later loops don't keep pushing it. The escalating
; per-loop bonus stops growing once it reaches this total. 0 = no cap. HOST-side.
spawn_spread_max_pct = 10000

; Enable debug tools (F11 warp)
; Developer tools, off for normal play. Enables the F11 hotkey to instantly warp
; to warp_floor below (keeps your character). Does NOT change difficulty (no New
; Game+).
test_warp = 0

; F11 Warps To:
; Which floor F11 warps you to (0..12). 12 jumps straight to the final fight.
warp_floor = 12


[npc]
; Fairies:
; The caged fairy you rescue for a blessing. 0 = Default (the 2nd floor of each
; biome, floors 2/5/8/11, each biome's own fairy). 1 = None (it never spawns). 2 =
; All Levels (a fairy on every floor, matching that floor's biome). 3 = One In
; First Biome / Classic (a single fairy, only in the Caves on floor 2).
fairy_mode = 0

; Stack fairy blessings
; Resting at the campfire gives +5 HP (by default, see fairy_heal) per fairy you
; rescued, but vanilla caps it at one per biome (max +20). This makes EVERY fairy
; add its bonus, so same-biome fairies stack (pair with Fairies = All Levels to
; actually find extras). Host-side, so non-modded clients get it too. The stack
; resets when the run loops.
fairy_stack_blessing = 1

; HP per fairy:
; HP each rescued fairy adds when you rest at the campfire (0..1000). Vanilla is 5.
; The base 20 HP rest (with no fairies) is unchanged. Works with or without
; stacking. Host-side, so non-modded clients get it too.
fairy_heal = 5


[mage]
; Wand skill tree (instead of Rod) (REQUIRES HOST AND CLIENT TO HAVE MOD)
; The mage levels the Wand affinity/skill tree instead of the Rod skill tree. Does
; not change the weapon by itself. NOTE: unlike the weapon, the skill tree does
; NOT sync from host to client. Each player's tree is rebuilt locally from their
; class. So a client's mage only gets the Wand tree if that CLIENT also runs the
; mod with this on (host and client should match). An unmodded client stuck on the
; Rod tree can fix the mismatch by leaving and rejoining the in-progress game.
wand_skill_tree = 0

; Start with a random Wand (instead of Rod)
; The mage starts holding a random Wand weapon instead of the Rod. Independent of
; the skill-tree option; enable both for the full wand swap. HOST ONLY: the host
; builds every player's character, so a modded host applies it to all players
; including non-modded clients. Applies when a new run is created.
random_wand_weapon = 0

; Starting Wand Gets Zero Charges (More Balanced)
; Any wand you start with begins at 0 charges (it still recharges normally). Covers
; the mage's starting wand and a Random-class character that rolls a Wand skill
; tree (with random_match_weapon on). Applies when a character is created.
wand_zero_charges = 1


[player]
; Spawn each player with unlimited bombs
; Every player starts with 1 Bomb that is God Cursed added to their inventory.
; Because it's cursed it is never consumed on throw, so it's effectively unlimited
; bombs. HOST builds every player's loadout, so a modded host gives it to ALL
; players including non-modded clients. Applies when a character is created.
god_cursed_bomb = 0

; Random class: weapon matches first weapon skill tree
; When you pick the Random class, you normally get the rolled class's fixed weapon
; (knight = sword, etc). With this on, you instead start with the weapon for your
; FIRST weapon skill tree: roll a Rod tree and you start with a Rod, a Sword tree a
; Sword, Fists (CQC) caestus, and so on. Only affects Random characters. HOST
; builds every player's loadout, so a modded host applies it to all Random clients.
; Applies when a character is created.
random_match_weapon = 0

; ...if no weapon skill tree, use the default weapon (off = fists)
; Only matters with random_match_weapon on. When a Random character rolled NO
; weapon skill tree: 1 = start with the rolled class's normal weapon (knight =
; sword, etc); 0 = start with fists (caestus).
random_no_tree_default = 1

; ...if Archery skill tree, also start with a bow + 30 arrows
; When a Random character rolled the Archery skill tree, give them a bow and 30
; arrows IN ADDITION to their matched melee weapon. Only affects Random characters.
random_archery_bow = 0

; Random class: randomize starting health (60-100)
; When you pick the Random class, your maximum health is rolled to a random value
; between 60 and 100 (normal full health is 100). Rolled fresh each time a Random
; character is created, and you start at full. Only affects Random characters. HOST
; builds every player's character, so a modded host applies it to all Random
; clients.
random_health = 0


[multiplayer]
; Allow new players to join/spectate mid-game
; HOST ONLY. Normally, once a run starts the host stops accepting new players
; ("That game has already started.") and only lets previously-connected players
; rejoin. With this on, a brand-new player who joins mid-run is admitted to a free
; slot with no character = spectator (they can watch; existing rejoin is
; unchanged). Still capped at 4 players. IMPORTANT: this is applied at STARTUP, so
; it must be turned ON before the host launches the game. It does not take effect
; on a host that is already running.
allow_midgame_spectators = 1

; Keep lobby joinable mid-game (show JOIN to vanilla clients)
; HOST ONLY. Normally the host marks the lobby not-joinable once the run starts, so
; a client WITHOUT the mod stops seeing the JOIN button in the lobby browser. With
; this on, the lobby keeps advertising as joinable so stock clients still see and
; can click JOIN mid-run. Pair it with allow_midgame_spectators so they're actually
; admitted (as spectators) instead of bounced. It respects your public/friends
; privacy setting, and a full lobby still says "Server is full.". IMPORTANT:
; applied at STARTUP, so it must be turned ON before the host launches the game. It
; does not take effect on a host that is already running.
keep_lobby_joinable = 0
